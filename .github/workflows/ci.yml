name: Wanderlust CI/CD

on:
  push:
    branches: ["main"]


jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout code
    - name: Checkout Code
      uses: actions/checkout@v4

    # ⚙️ Setup exact Node version (matches local + Render)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.11.0
        cache: npm

    # 📦 Install exact dependencies
    - name: Install Dependencies
      run: npm ci

    # 🔐 Security check (fail on high/critical)
    - name: Security Audit
      run: npm audit --audit-level=high || exit 1

    # 🏗️ Build project (if applicable)
    - name: Build
      run: npm run build --if-present

    # 🧪 Run tests (safe fallback if none)
    - name: Run Tests
      run: npm test || echo "No tests found"

    # 🚀 Start server + health check
    - name: Start Server & Health Check
      run: |
        node server.js &
        sleep 5
        curl http://localhost:8080 || exit 1

    # 🚀 Deploy to Render ONLY if all above steps pass
    - name: Trigger Render Deploy
      run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}
