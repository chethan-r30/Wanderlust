name: Wanderlust CI/CD

on:
  push:
    branches: ["main"]
  

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    # 📥 Checkout
    - name: Checkout Code
      uses: actions/checkout@v4

    # ⚙️ Node setup
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.11.0
        cache: npm

    # 📦 Install dependencies
    - name: Install Dependencies
      run: npm ci

    # 🔐 Security check
    - name: Security Audit
      run: npm audit --audit-level=high || exit 1

    # 🏗️ Build
    - name: Build
      run: npm run build --if-present

    # 🧪 Tests
    - name: Run Tests
      run: npm test || echo "No tests found"

    # 🚀 Start server with ENV + health check
    - name: Start Server & Health Check
      env:
        CLOUD_NAME: ${{ secrets.CLOUD_NAME }}
        CLOUD_API_KEY: ${{ secrets.CLOUD_API_KEY }}
        CLOUD_API_SECRET: ${{ secrets.CLOUD_API_SECRET }}
        MAP_TOKEN: ${{ secrets.MAP_TOKEN }}
        ATLASDB_URL: ${{ secrets.ATLASDB_URL }}
        SECRET: ${{ secrets.SECRET }}
      run: |
        node app.js &
        sleep 8
        curl http://localhost:8080 || exit 1

    # 🚀 Deploy to Render
    - name: Trigger Render Deploy
      run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}
